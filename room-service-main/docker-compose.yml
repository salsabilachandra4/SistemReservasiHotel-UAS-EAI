services:
  room-app:
    build: .
    container_name: room-app
    volumes:
      - .:/var/www
      - room_vendor:/var/www/vendor
    networks:
      - laravel-net
    depends_on:
      room-db:
        condition: service_healthy

  room-nginx:
    image: nginx:stable-alpine
    container_name: room-nginx
    ports:
      - "8002:80"
    volumes:
      - .:/var/www
      - room_vendor:/var/www/vendor
      - ../nginx/room.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-net
    depends_on:
      - room-app

  room-db:
    image: mysql:8
    container_name: room-db
    environment:
      MYSQL_DATABASE: rooms
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3308:3306"
    volumes:
      - room_db_data:/var/lib/mysql
    networks:
      - laravel-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  laravel-net:
    external: true

volumes:
  room_db_data:
  room_vendor:
